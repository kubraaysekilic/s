<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nasıl İnanmalı? – Sınav Hazırlık</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #fdf6ec;
    --rose: #e8a0a0;
    --rose-dark: #c97b7b;
    --sage: #a8c4a0;
    --sage-dark: #6d9b64;
    --lavender: #c9b8e8;
    --peach: #f5c9a0;
    --brown: #7a5c3a;
    --text: #3d2b1f;
    --text-light: #7a6050;
    --white: #fff9f3;
    --correct-bg: #d4edda;
    --correct-border: #6aaa7e;
    --wrong-bg: #fde8e8;
    --wrong-border: #d97575;
    --selected-bg: #e8e0f5;
    --selected-border: #9b80d4;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: var(--cream);
    font-family: 'Lato', sans-serif;
    color: var(--text);
    min-height: 100vh;
    background-image:
      radial-gradient(circle at 10% 20%, rgba(232,160,160,0.15) 0%, transparent 40%),
      radial-gradient(circle at 90% 80%, rgba(168,196,160,0.15) 0%, transparent 40%),
      radial-gradient(circle at 50% 50%, rgba(201,184,232,0.08) 0%, transparent 60%);
  }

  /* Floating flowers */
  .flower-bg {
    position: fixed;
    pointer-events: none;
    z-index: 0;
    opacity: 0.12;
    font-size: 2rem;
    animation: float 8s ease-in-out infinite;
  }
  .flower-bg:nth-child(1) { top: 5%; left: 3%; animation-delay: 0s; font-size: 1.8rem; }
  .flower-bg:nth-child(2) { top: 15%; right: 4%; animation-delay: 1.5s; font-size: 1.5rem; }
  .flower-bg:nth-child(3) { top: 40%; left: 1%; animation-delay: 3s; font-size: 2rem; }
  .flower-bg:nth-child(4) { top: 60%; right: 2%; animation-delay: 0.7s; font-size: 1.6rem; }
  .flower-bg:nth-child(5) { top: 80%; left: 4%; animation-delay: 2s; font-size: 1.4rem; }
  .flower-bg:nth-child(6) { bottom: 5%; right: 5%; animation-delay: 4s; font-size: 2.2rem; }

  @keyframes float {
    0%, 100% { transform: translateY(0px) rotate(0deg); }
    50% { transform: translateY(-12px) rotate(5deg); }
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 760px;
    margin: 0 auto;
    padding: 20px 16px 40px;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 28px 20px 20px;
    background: linear-gradient(135deg, rgba(255,249,243,0.9), rgba(253,246,236,0.95));
    border-radius: 20px;
    border: 1.5px solid rgba(232,160,160,0.4);
    box-shadow: 0 4px 20px rgba(122,92,58,0.08);
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '🌸';
    position: absolute;
    top: -8px; left: 10px;
    font-size: 2.5rem;
    opacity: 0.3;
  }
  .header::after {
    content: '🌺';
    position: absolute;
    bottom: -8px; right: 10px;
    font-size: 2.5rem;
    opacity: 0.3;
  }
  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.7rem;
    color: var(--brown);
    margin-bottom: 4px;
    line-height: 1.3;
  }
  .header p {
    color: var(--text-light);
    font-size: 0.85rem;
    font-weight: 300;
  }

  /* Progress */
  .progress-bar-wrap {
    background: rgba(122,92,58,0.1);
    border-radius: 30px;
    height: 8px;
    margin: 14px 0 8px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--rose), var(--lavender), var(--sage));
    border-radius: 30px;
    transition: width 0.5s ease;
  }

  /* Nav top */
  .nav-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.8rem;
    color: var(--text-light);
  }
  .score-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: rgba(110,155,100,0.15);
    border: 1px solid var(--sage);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 0.78rem;
    color: var(--sage-dark);
    font-weight: 700;
  }

  /* Question card */
  .question-card {
    background: var(--white);
    border-radius: 20px;
    border: 1.5px solid rgba(232,160,160,0.3);
    box-shadow: 0 6px 24px rgba(122,92,58,0.07);
    padding: 24px 20px;
    margin-bottom: 18px;
    position: relative;
    overflow: hidden;
  }
  .question-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--rose), var(--lavender), var(--peach), var(--sage));
  }

  .question-header {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 16px;
  }
  .question-num {
    background: linear-gradient(135deg, var(--rose), var(--lavender));
    color: white;
    font-size: 0.7rem;
    font-weight: 700;
    border-radius: 30px;
    padding: 4px 10px;
    white-space: nowrap;
    margin-top: 2px;
    flex-shrink: 0;
  }
  .question-text {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    line-height: 1.55;
    color: var(--text);
    font-weight: 400;
  }

  /* Options */
  .options {
    display: flex;
    flex-direction: column;
    gap: 9px;
    margin-bottom: 10px;
  }

  .option-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    background: rgba(253,246,236,0.7);
    border: 1.5px solid rgba(122,92,58,0.12);
    border-radius: 12px;
    cursor: pointer;
    text-align: left;
    font-family: 'Lato', sans-serif;
    font-size: 0.88rem;
    color: var(--text);
    line-height: 1.4;
    transition: all 0.2s ease;
    width: 100%;
    -webkit-tap-highlight-color: transparent;
  }
  .option-btn:hover:not(.disabled) {
    background: rgba(201,184,232,0.2);
    border-color: var(--lavender);
    transform: translateX(3px);
  }
  .option-btn.disabled { cursor: default; }

  .option-letter {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: rgba(122,92,58,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--brown);
    flex-shrink: 0;
    transition: all 0.2s;
  }

  .option-btn.selected {
    background: var(--selected-bg);
    border-color: var(--selected-border);
  }
  .option-btn.selected .option-letter {
    background: var(--selected-border);
    color: white;
  }
  .option-btn.correct {
    background: var(--correct-bg);
    border-color: var(--correct-border);
  }
  .option-btn.correct .option-letter {
    background: var(--correct-border);
    color: white;
  }
  .option-btn.wrong {
    background: var(--wrong-bg);
    border-color: var(--wrong-border);
  }
  .option-btn.wrong .option-letter {
    background: var(--wrong-border);
    color: white;
  }

  /* Feedback */
  .feedback {
    display: none;
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 0.84rem;
    line-height: 1.5;
    margin-top: 12px;
  }
  .feedback.show { display: flex; gap: 10px; align-items: flex-start; }
  .feedback.correct-fb {
    background: var(--correct-bg);
    border: 1px solid var(--correct-border);
    color: #2d6a4a;
  }
  .feedback.wrong-fb {
    background: var(--wrong-bg);
    border: 1px solid var(--wrong-border);
    color: #9b3a3a;
  }
  .feedback-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 1px; }
  .feedback-text strong { display: block; margin-bottom: 3px; font-size: 0.85rem; }

  /* Navigation buttons */
  .nav-buttons {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    margin-top: 16px;
  }
  .nav-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 11px 20px;
    border-radius: 30px;
    border: 1.5px solid;
    font-family: 'Lato', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .nav-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-prev {
    background: transparent;
    border-color: rgba(122,92,58,0.25);
    color: var(--text-light);
  }
  .btn-prev:not(:disabled):hover {
    background: rgba(122,92,58,0.06);
  }
  .btn-next {
    background: linear-gradient(135deg, var(--rose), var(--lavender));
    border-color: transparent;
    color: white;
    box-shadow: 0 3px 12px rgba(201,123,123,0.3);
  }
  .btn-next:not(:disabled):hover {
    transform: translateY(-1px);
    box-shadow: 0 5px 16px rgba(201,123,123,0.4);
  }
  .question-counter-mid {
    font-size: 0.78rem;
    color: var(--text-light);
    text-align: center;
  }

  /* Results screen */
  #results-screen {
    display: none;
    text-align: center;
    padding: 32px 20px;
    background: var(--white);
    border-radius: 24px;
    border: 1.5px solid rgba(232,160,160,0.3);
    box-shadow: 0 8px 32px rgba(122,92,58,0.1);
  }
  .result-emoji { font-size: 3.5rem; margin-bottom: 12px; display: block; }
  .result-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    color: var(--brown);
    margin-bottom: 8px;
  }
  .result-score {
    font-size: 2.8rem;
    font-weight: 700;
    color: var(--rose-dark);
    line-height: 1;
    margin: 12px 0 6px;
  }
  .result-sub { color: var(--text-light); font-size: 0.88rem; margin-bottom: 24px; }
  .stat-row {
    display: flex;
    justify-content: center;
    gap: 14px;
    margin: 16px 0 24px;
    flex-wrap: wrap;
  }
  .stat-box {
    padding: 10px 16px;
    border-radius: 14px;
    font-size: 0.82rem;
    font-weight: 700;
    min-width: 80px;
  }
  .stat-correct { background: var(--correct-bg); color: #2d6a4a; border: 1px solid var(--correct-border); }
  .stat-wrong { background: var(--wrong-bg); color: #9b3a3a; border: 1px solid var(--wrong-border); }
  .stat-skip { background: rgba(201,184,232,0.3); color: #6040a0; border: 1px solid var(--lavender); }

  .restart-btn {
    background: linear-gradient(135deg, var(--sage), var(--sage-dark));
    color: white;
    border: none;
    border-radius: 30px;
    padding: 13px 30px;
    font-family: 'Lato', sans-serif;
    font-size: 0.92rem;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(108,155,100,0.35);
    transition: all 0.2s;
  }
  .restart-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(108,155,100,0.45); }

  /* Divider */
  .section-divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 4px 0 10px;
    font-size: 0.72rem;
    color: var(--text-light);
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .section-divider::before, .section-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(122,92,58,0.12);
  }

  /* Özet çıktısı için scrollable */
  .result-scroll {
    max-height: 220px;
    overflow-y: auto;
    text-align: left;
    margin: 10px 0 16px;
    padding-right: 4px;
  }
  .result-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 10px;
    border-radius: 8px;
    font-size: 0.79rem;
    margin-bottom: 5px;
    line-height: 1.3;
  }
  .result-item.r-correct { background: #edfaf2; color: #2d6a4a; }
  .result-item.r-wrong { background: #fef0f0; color: #9b3a3a; }
  .result-item.r-skip { background: rgba(201,184,232,0.2); color: #6040a0; }
  .ri-icon { font-size: 0.85rem; flex-shrink: 0; }

  @media (max-width: 480px) {
    .header h1 { font-size: 1.3rem; }
    .question-text { font-size: 0.92rem; }
    .option-btn { font-size: 0.82rem; padding: 10px 12px; }
    .nav-btn { padding: 9px 16px; font-size: 0.8rem; }
  }
</style>
</head>
<body>

<!-- Decorative floating flowers -->
<span class="flower-bg">🌸</span>
<span class="flower-bg">🌺</span>
<span class="flower-bg">🌼</span>
<span class="flower-bg">🌷</span>
<span class="flower-bg">🌻</span>
<span class="flower-bg">🍃</span>

<div class="container">

  <!-- Header -->
  <div class="header">
    <h1>📖 Nasıl İnanmalı?</h1>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
    </div>
    <div class="nav-info">
      <div class="score-badge" id="scoreBadge">✅ 0 doğru</div>
      <span id="progressText">0 / 50 tamamlandı</span>
    </div>
  </div>

  <!-- Quiz area -->
  <div id="quiz-area">
    <div class="question-card" id="questionCard">
      <div class="question-header">
        <span class="question-num" id="qNum">Soru 1 / 50</span>
        <div class="question-text" id="qText"></div>
      </div>
      <div class="options" id="optionsContainer"></div>
      <div class="feedback" id="feedback">
        <span class="feedback-icon" id="fbIcon"></span>
        <div class="feedback-text" id="fbText"></div>
      </div>
    </div>

    <div class="nav-buttons">
      <button class="nav-btn btn-prev" id="prevBtn" onclick="navigate(-1)" disabled>← Önceki</button>
      <div class="question-counter-mid" id="qCounterMid">1 / 50</div>
      <button class="nav-btn btn-next" id="nextBtn" onclick="navigate(1)">Sonraki →</button>
    </div>
  </div>

  <!-- Results -->
  <div id="results-screen">
    <span class="result-emoji" id="resultEmoji">🌸</span>
    <div class="result-title">Sınav Tamamlandı!</div>
    <div class="result-score" id="resultScore">0/50</div>
    <div class="result-sub" id="resultSub">Sonuçlarınız aşağıda</div>
    <div class="stat-row">
      <div class="stat-box stat-correct" id="statCorrect">✅ 0 Doğru</div>
      <div class="stat-box stat-wrong" id="statWrong">❌ 0 Yanlış</div>
      <div class="stat-box stat-skip" id="statSkip">○ 0 Boş</div>
    </div>
    <div class="section-divider">Soru Özeti</div>
    <div class="result-scroll" id="resultScroll"></div>
    <button class="restart-btn" onclick="restartQuiz()">🌱 Yeniden Başla</button>
  </div>

</div>

<script>
const questions = [
  {
    "q": "Kitaba göre, insanın diğer varlıklardan üstün ve 'yaratılmışların en şereflisi' kılınmasının temel sebebi nedir?",
    "opts": [
      "Fiziksel olarak daha güçlü olması",
      "Akıl ve irade sahibi olması",
      "Daha uzun ömürlü olması",
      "Teknoloji üretebilmesi",
      "Sosyal bir varlık olması"
    ],
    "correct": 1,
    "explanation": "Kitapta insanın sahip olduğu akıl ve irade ile bütün yaratılmışlardan üstün kılındığı ve bu özelliğiyle en şerefli varlık olduğu belirtilmiştir[cite: 5, 6]."
  },
  {
    "q": "İslam akaidinde, inanılması gereken hususların tamamını ifade eden 'amentü' kavramı yerine kullanılan diğer terim hangisidir?",
    "opts": [
      "Fıkıh",
      "Tasavvuf",
      "Akaid",
      "Siyer",
      "Hadis"
    ],
    "correct": 2,
    "explanation": "Müslümanların inanması gereken hususların tamamını ifade etmek için 'akaid' sözcüğü de kullanılmaktadır[cite: 20, 21]."
  },
  {
    "q": "Kitapta belirtildiğine göre, tarihteki en meşhur akaid metinlerinden biri olan 'El-Fıkhü’l-Ekber' kime aittir?",
    "opts": [
      "İmam Gazali",
      "Ebu Hanife",
      "İmam Şafii",
      "İmam Maturidi",
      "İmam Eş'ari"
    ],
    "correct": 1,
    "explanation": "Tarihteki en meşhur akaid metinleri arasında Ebu Hanife'nin El-Fıkhü’l-Ekber'i sayılmıştır[cite: 23]."
  },
  {
    "q": "Bilim ve inanç arasındaki ilişki kitapta nasıl tanımlanmıştır?",
    "opts": [
      "Bilim ve inanç birbirine tamamen zıttır.",
      "İnanç bilimden daha önce doğmuştur.",
      "Bilim evreni anlar, inanç ise anlamlandırır.",
      "Bilim her sorunun cevabını verir.",
      "İnanç sadece duygularla ilgilidir."
    ],
    "correct": 2,
    "explanation": "Kitapta 'Bilim evreni anlar, inanç ise anlamlandırır' ifadesi kullanılarak iki alanın işlevi ayırt edilmiştir[cite: 748]."
  },
  {
    "q": "İslam inancına göre, imanın sadece bir kabulden ibaret olmayıp insana yüklediği sorumlulukların bütününe ne ad verilir?",
    "opts": [
      "İslam'ın yaşanması",
      "Sadece ibadet",
      "Kültürel Müslümanlık",
      "Teorik bilgi",
      "Taklit"
    ],
    "correct": 0,
    "explanation": "İbadetler, sosyal hayat, eğitim ve giyinme gibi tüm kuralların hayata geçirilmesi 'İslam'ın yaşanması' kavramıyla ifade edilir[cite: 62]."
  },
  {
    "q": "Kitaba göre, 'gerçek iç huzuru' (itminan) elde etmenin temel şartı nedir?",
    "opts": [
      "Çok para kazanmak",
      "Yüksek bir kariyere sahip olmak",
      "Allah'a ve ahiret gününe iman etmek",
      "Sürekli seyahat etmek",
      "Yalnız yaşamak"
    ],
    "correct": 2,
    "explanation": "Gerçek iç huzuru ve ruhsal tatminin (itminan) Allah'a ve ahiret gününe iman etmekle elde edildiği vurgulanmıştır[cite: 805]."
  },
  {
    "q": "Kur'an-ı Kerim'in ilk emri olan 'Oku' ifadesiyle ilgili kitapta yapılan yorum aşağıdakilerden hangisidir?",
    "opts": [
      "Sadece kitap okumaktır.",
      "Ertelenmemesi gereken bir sorumluluktur.",
      "Yalnızca din görevlilerine hitap eder.",
      "Geçmişi araştırmaktır.",
      "Modern bilimleri reddetmektir."
    ],
    "correct": 1,
    "explanation": "Vahyin ilk emri olan 'Oku' ifadesinin ertelenmemesi gereken bir görev ve sorumluluk olduğu belirtilmiştir[cite: 823, 824]."
  },
  {
    "q": "Kur'an-ı Kerim'de bilişsel süreci (bilme sürecini) ifade etmek için kullanılan merkezi 'şemsiye kavram' hangisidir?",
    "opts": [
      "Mantık",
      "Felsefe",
      "İlim",
      "Tecrübe",
      "Duygu"
    ],
    "correct": 2,
    "explanation": "Kur'an'ın bilişsel süreci ifade etmek için kullandığı merkezi şemsiye kavram 'ilim'dir[cite: 834]."
  },
  {
    "q": "İslam bilgi anlayışına göre, bilginin kesinliğini ve güvenilirliğini etkileyen en önemli faktör nedir?",
    "opts": [
      "Bilginin güncelliği",
      "Bilginin kaynakları",
      "Bilginin popülerliği",
      "Bilginin karmaşıklığı",
      "Bilginin miktarı"
    ],
    "correct": 1,
    "explanation": "Bilginin kesinlik ve güvenilirliğini etkileyen faktörlerin başında bilginin kaynakları (duyular, akıl, haber/vahiy) gelmektedir[cite: 855]."
  },
  {
    "q": "Kitaba göre Kur'an, bilgi edinme sürecinde fiziksel bir organ olmanın ötesinde hangi yetiye özel bir önem verir?",
    "opts": [
      "Hafıza",
      "Hayal gücü",
      "Kalp",
      "İçgüdü",
      "Refleks"
    ],
    "correct": 2,
    "explanation": "Kur'an, bilgi edinme sürecinde kalbe özel bir önem verir; kalp burada düşünen ve iman eden bir yeti olarak işlev görür[cite: 863, 864]."
  },
  {
    "q": "Kur'an'da akıl kavramının isim olarak değil de 'fiil' (akletme) olarak kullanılmasının anlamı nedir?",
    "opts": [
      "Aklın önemsiz olması",
      "Aklın durağan bir yapıda olması",
      "Aklın aktif ve dinamik bir süreç olması",
      "Aklın sadece geçmişle ilgili olması",
      "Aklın sadece ibadetlerde kullanılması"

    "explanation": "Büyüklere saygı ve yaşlılara hizmet, İslam ahlakının ve toplum huzurunun gereğidir."
  },
  {
    "q": "Aşağıdakilerden hangisi İslam inancında 'haram' kılınmış bir kazanç yoludur?",
    "opts": [
      "Ticaret",
      "Ziraat",
      "Faiz (Riba)",
      "Maaşlı çalışma",
      "Miras"
    ],
    "correct": 2,
    "explanation": "Faiz, haksız kazanç ve sömürüye dayalı olduğu için Kur'an'da kesin bir dille yasaklanmıştır."
  },
  {
    "q": "İnsanın işlediği günahları küçük görerek onlara devam etmesi durumuna ne ad verilir?",
    "opts": [
      "İstikamet",
      "İstiğfar",
      "Israr",
      "Pişmanlık",
      "Basiret"
    ],
    "correct": 2,
    "explanation": "Günahlarda ısrar etmek, kalbin kararmasına ve büyük günahlara sürüklenmeye neden olur."
  },
  {
    "q": "Doğru yoldan ayrılmamak, hileye başvurmamak ve dürüstlüğü hayat felsefesi haline getirmeye ne denir?",
    "opts": [
      "İstikamet",
      "İstidrac",
      "İstişare",
      "İstila",
      "İstiklal"
    ],
    "correct": 0,
    "explanation": "İstikamet, 'Emrolunduğun gibi dosdoğru ol' ayetindeki gibi inanç ve eylemde dürüstlüktür."
  },
  {
    "q": "Bir iş hakkında karar vermeden önce o işi bilenlerle konuşup fikir alışverişinde bulunmaya ne denir?",
    "opts": [
      "İstişare",
      "Münazara",
      "Mülakat",
      "İstihare",
      "Muzakere"
    ],
    "correct": 0,
    "explanation": "İstişare (danışma), İslam'ın emrettiği bir yönetim ve hayat prensibidir. Hata payını azaltır."
  },
  {
    "q": "İslam'ın temel amacı aşağıdakilerden hangisidir?",
    "opts": [
      "İnsanı sadece bu dünyada zengin etmek",
      "İnsanları zorla Müslüman yapmak",
      "İnsanın hem dünya hem de ahiret mutluluğunu sağlamak",
      "Sadece eski tarihleri anlatmak",
      "Teknolojiye karşı çıkmak"
    ],
    "correct": 2,
    "explanation": "İslam, getirdiği esaslarla insanın iç huzurunu, toplumsal barışı ve ebedi kurtuluşunu hedefler."
  }
];

// State
let current = 0;
let answers = new Array(questions.length).fill(null); // null=boş, -1=yanlış, n=seçilen

function renderQuestion(idx) {
  const q = questions[idx];
  document.getElementById('qNum').textContent = `Soru ${idx+1} / ${questions.length}`;
  document.getElementById('qText').textContent = q.q;
  document.getElementById('qCounterMid').textContent = `${idx+1} / ${questions.length}`;

  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';
  const letters = ['A', 'B', 'C', 'D', 'E'];
  const answered = answers[idx] !== null;

  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn' + (answered ? ' disabled' : '');
    if (answered) {
      if (i === q.correct) btn.classList.add('correct');
      else if (i === answers[idx] && answers[idx] !== q.correct) btn.classList.add('wrong');
    }
    btn.innerHTML = `<span class="option-letter">${letters[i]}</span><span>${opt}</span>`;
    if (!answered) btn.onclick = () => selectAnswer(idx, i);
    container.appendChild(btn);
  });

  // Feedback
  const fb = document.getElementById('feedback');
  const fbIcon = document.getElementById('fbIcon');
  const fbText = document.getElementById('fbText');
  fb.className = 'feedback';
  if (answered) {
    if (answers[idx] === q.correct) {
      fb.classList.add('show','correct-fb');
      fbIcon.textContent = '✅';
      fbText.innerHTML = `<strong>Doğru!</strong>${q.explanation}`;
    } else {
      fb.classList.add('show','wrong-fb');
      fbIcon.textContent = '❌';
      const correctLetter = letters[q.correct];
      fbText.innerHTML = `<strong>Yanlış! Doğru cevap: ${correctLetter}</strong>${q.explanation}`;
    }
  }

  // Nav
  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').textContent = idx === questions.length - 1 ? 'Sonuçlar 🌸' : 'Sonraki →';

  updateProgress();
}

function selectAnswer(qIdx, optIdx) {
  if (answers[qIdx] !== null) return;
  answers[qIdx] = optIdx;
  renderQuestion(qIdx);
}

function navigate(dir) {
  const next = current + dir;
  if (next < 0) return;
  if (next >= questions.length) {
    showResults();
    return;
  }
  current = next;
  renderQuestion(current);
}

function updateProgress() {
  const answered = answers.filter(a => a !== null).length;
  const correct = answers.filter((a, i) => a === questions[i].correct).length;
  const pct = (answered / questions.length) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${answered} / ${questions.length} tamamlandı`;
  document.getElementById('scoreBadge').textContent = `✅ ${correct} doğru`;
}

function showResults() {
  document.getElementById('quiz-area').style.display = 'none';
  const rs = document.getElementById('results-screen');
  rs.style.display = 'block';

  const correct = answers.filter((a, i) => a !== null && a === questions[i].correct).length;
  const wrong = answers.filter((a, i) => a !== null && a !== questions[i].correct).length;
  const skip = answers.filter(a => a === null).length;
  const total = questions.length;
  const pct = Math.round((correct / total) * 100);

  let emoji = pct >= 80 ? '🌟' : pct >= 60 ? '🌸' : pct >= 40 ? '🌼' : '🌱';
  let msg = pct >= 80 ? 'Harika! Çok başarılısınız!' : pct >= 60 ? 'İyi iş! Biraz daha çalışın.' : pct >= 40 ? 'Orta düzey. Tekrar edin!' : 'Daha fazla çalışmanız gerekiyor.';

  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultScore').textContent = `${correct}/${total}`;
  document.getElementById('resultSub').textContent = `${pct}% başarı oranı — ${msg}`;
  document.getElementById('statCorrect').textContent = `✅ ${correct} Doğru`;
  document.getElementById('statWrong').textContent = `❌ ${wrong} Yanlış`;
  document.getElementById('statSkip').textContent = `○ ${skip} Boş`;

  const scroll = document.getElementById('resultScroll');
  scroll.innerHTML = '';
  const letters = ['A','B','C','D','E'];
  questions.forEach((q, i) => {
    const a = answers[i];
    const div = document.createElement('div');
    let cls = 'result-item r-skip';
    let icon = '○';
    let info = 'Boş bıraktınız';
    if (a !== null && a === q.correct) { cls = 'result-item r-correct'; icon = '✅'; info = `Doğru (${letters[a]})`; }
    else if (a !== null) { cls = 'result-item r-wrong'; icon = '❌'; info = `Yanlış — Doğru: ${letters[q.correct]}`; }
    div.className = cls;
    div.innerHTML = `<span class="ri-icon">${icon}</span><span><b>${i+1}.</b> ${q.q.substring(0, 55)}… <em>${info}</em></span>`;
    scroll.appendChild(div);
  });
}

function restartQuiz() {
  answers = new Array(questions.length).fill(null);
  current = 0;
  document.getElementById('results-screen').style.display = 'none';
  document.getElementById('quiz-area').style.display = 'block';
  renderQuestion(0);
}

// Init
renderQuestion(0);
</script>
